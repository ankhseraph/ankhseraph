steps:
  update-readme:
    when:
      event: [push, cron, manual]
    image: node:22
    environment:
      CBTOKEN:
        from_secret: cbtoken
      CBMAIL:
        from_secret: cbmail
    commands:
      - git config --global user.email "$CBMAIL"
      - git config --global user.name "CI Builder"
      - git remote set-url origin https://$CBTOKEN@codeberg.org/ankhseraph/.profile.git
      - node scripts/update-readme.mjs
      - git add README.md
      - git diff --cached --quiet || git commit -m "chore: update README" || true
      - git push
